receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    # We will add Tempo here later for distributed tracing!

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheus]

