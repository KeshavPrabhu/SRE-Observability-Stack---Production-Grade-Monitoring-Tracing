global:
  scrape_interval: 5s #fast scraping for real-time testing 

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

#  - job_name: 'backend'
#    static_configs:
#      - targets: ['backend:5000']

  - job_name: 'telegraf-postgres'  
    static_configs:
      - targets: ['telegraf:9273']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']